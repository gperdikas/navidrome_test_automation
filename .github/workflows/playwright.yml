name: Playwright Tests
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    services:
      navidrome:
        image: deluan/navidrome:latest
        ports:
          - 4533:4533
    env:
      BASE_URL: ${{secrets.BASE_URL}}
      TEST_USERNAME: ${{secrets.TEST_USERNAME}}
      TEST_PASSWORD: ${{secrets.TEST_PASSWORD}}
      INVALID_USERNAME: ${{secrets.INVALID_USERNAME}}
      INVALID_PASSWORD: ${{secrets.INVALID_PASSWORD}}
      HALF_USERNAME: ${{secrets.HALF_USERNAME}}
      HALF_PASSWORD: ${{secrets.HALF_PASSWORD}}
      NADM_USER_TEST1: ${{secrets.NADM_USER_TEST1}}
      NADM_PSW_TEST1: ${{secrets.NADM_PSW_TEST1}}
      NADM_USER_TEST2: ${{secrets.NADM_USER_TEST2}}
      NADM_PSW_TEST2: ${{secrets.NADM_PSW_TEST2}}
      NADM_USER_TEST3: ${{secrets.NADM_USER_TEST3}}
      NADM_USER_TEST4: ${{secrets.NADM_USER_TEST4}}
      EMPTY_CREDENTIAL: ${{secrets.EMPTY_CREDENTIAL}}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Create Navidrome users
      run: |
        sleep 15
        # Create admin via signup page with debugging
        cat > signup.js << 'EOF'
        const { chromium } = require('playwright');
        (async () => {
          const browser = await chromium.launch();
          const page = await browser.newPage();
          await page.goto('http://localhost:4533');
          await page.waitForTimeout(2000);
      
          // Debug: print page title and URL
          console.log('Page URL:', page.url());
          console.log('Page title:', await page.title());
      
          // Debug: print all input fields
          const inputs = await page.$$eval('input', inputs => inputs.map(i => ({name: i.name, type: i.type, placeholder: i.placeholder})));
          console.log('Input fields:', JSON.stringify(inputs, null, 2));
      
          await browser.close();
        })();
        EOF
        node signup.js
    - name: Run Playwright tests
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
